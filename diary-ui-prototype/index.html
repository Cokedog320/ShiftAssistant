<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日记页面 UI 原型 - 融合版</title>
    <style>
        :root {
            --text-primary: #333333;
            --text-secondary: #777777;
            --danger: #FF6B6B;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            
            /* 提取自 B 的柔和配色 */
            --bg-gentle: #F4F7F6;
            --accent-gentle: #8EB6A8; 
            --accent-gentle-light: #EBF2F0;
        }

        body {
            margin: 0;
            padding: 40px;
            background-color: #E8ECEF;
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .version-title {
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 30px;
        }

        .phone-container {
            width: 375px;
            height: 812px;
            background-color: var(--bg-gentle); /* 柔和底色 */
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            border: 8px solid #D0D5DC;
        }

        /* 顶部 Header (结构来自 C，元素样式融入 B) */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 20px 20px;
        }
        
        .header-left {
            display: flex;
            align-items: center;
        }
        
        .back-btn {
            font-size: 18px;
            color: var(--text-primary);
            width: 36px;
            height: 36px;
            background: #FFFFFF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            margin-right: 12px;
        }
        
        .date-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .btn-delete-top {
            color: var(--danger);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            background: #FFFFFF;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            box-shadow: var(--shadow-sm);
            transition: transform 0.1s;
        }
        .btn-delete-top:active {
            transform: scale(0.95);
        }

        /* 内容卡片区 (防止 A 的空旷感，吸收 B 的卡片感) */
        .card-container {
            margin: 0 20px 20px;
            background: #FFFFFF;
            border-radius: 24px;
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-sm);
        }

        .mood-label {
            font-size: 13px;
            font-weight: 600;
            color: #999;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }
        
        .mood-chips {
            display: flex;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px dashed #F0F0F0;
        }
        
        .mood-chip-wrapper {
            width: 48px;
            min-height: 60px;
            border-radius: 16px;
            background: #F9FAFB;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            filter: grayscale(100%);
            opacity: 0.5;
        }
        
        .mood-chip-wrapper.active {
            background-color: var(--accent-gentle-light);
            filter: grayscale(0%);
            opacity: 1;
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 8px 16px rgba(142, 182, 168, 0.2);
        }

        .mood-text {
            font-size: 10px;
            line-height: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .text-area {
            flex: 1;
            width: 100%;
            border: none;
            font-size: 16px;
            line-height: 1.8;
            color: var(--text-primary);
            resize: none;
            outline: none;
        }
        
        .text-area::placeholder {
            color: #D0D0D0;
        }

        /* 底部操作区 (结构来自 C) */
        .actions {
            padding: 0 20px 32px;
        }
        
        .btn-save {
            width: 100%;
            padding: 16px 0;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background-color: var(--accent-gentle);
            color: #FFFFFF;
            border: none;
            box-shadow: var(--shadow-sm);
            transition: background-color 0.2s;
        }
        .btn-save:hover {
            background-color: #7EA99A;
        }
    </style>
</head>
<body>

    <div class="version-title">全新融合版 (结合 C 的实用结构与 B 的温柔卡片)</div>
    
    <div class="phone-container">
        <!-- 头部 (结构 C: 返回 + 日期 + 保存) -->
        <div class="header">
            <div class="header-left">
                <span class="back-btn">←</span>
                <div class="date-title">5月21日 星期四</div>
            </div>
            <button class="btn-delete-top">删除</button>
        </div>
        
        <!-- 主体卡片 (吸收 B 的实体感，拒绝空旷) -->
        <div class="card-container">
            <div class="mood-label">当前心情</div>
            <div class="mood-chips">
                <div class="mood-chip-wrapper">
                    <span class="mood-chip">😃</span>
                    <span class="mood-text">开心</span>
                </div>
                <div class="mood-chip-wrapper active">
                    <span class="mood-chip">😊</span>
                    <span class="mood-text">平静</span>
                </div>
                <div class="mood-chip-wrapper">
                    <span class="mood-chip">😐</span>
                    <span class="mood-text">一般</span>
                </div>
                <div class="mood-chip-wrapper">
                    <span class="mood-chip">😔</span>
                    <span class="mood-text">低落</span>
                </div>
                <div class="mood-chip-wrapper">
                    <span class="mood-chip">😠</span>
                    <span class="mood-text">烦躁</span>
                </div>
            </div>
            <textarea class="text-area" placeholder="在这里记录下今天的点滴..."></textarea>
        </div>
        
        <!-- 底部删除 (结构 C) -->
        <div class="actions">
            <button class="btn-save">保存日记</button>
        </div>
    </div>

</body>
</html>
